<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login Homem-Aranha</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle, #1a0000, #000000);
    }

    .login-box {
        width: 320px;
        padding: 40px;
        border-radius: 20px;
        background: rgba(0, 0, 0, 0.8);
        box-shadow: 0 0 20px red;
        text-align: center;
        color: white;
        border: 2px solid red;
        animation: aparecer 1s ease;
    }

    @keyframes aparecer {
        from {
            opacity: 0;
            transform: scale(0.8);
        }
        to {
            opacity: 1;
            transform: scale(1);
        }
    }

    h2 {
        margin-bottom: 20px;
        color: red;
        text-shadow: 0 0 10px red;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid red;
        border-radius: 10px;
        outline: none;
        background: black;
        color: white;
    }

    input::placeholder {
        color: #aaa;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: red;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
    }

    button:hover {
        background: darkred;
        transform: scale(1.05);
        box-shadow: 0 0 10px red;
    }

    .erro {
        margin-top: 10px;
        color: #ff6666;
    }

    .logo {
        font-size: 40px;
        margin-bottom: 10px;
    }
</style>
</head>

<body>

<div class="login-box">
    <div class="logo">🕷️</div>
    <h2>Spider Login</h2>

    <input type="text" id="usuario" placeholder="Usuário">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="logar()">Entrar</button>

    <!-- BOTÃO QUE VAI PARA OUTRA PÁGINA -->
    <button onclick="irMercadinho()">Ir para o Mercadinho 🛒</button>

    <p class="erro" id="mensagem"></p>
</div>

<script>
function logar() {
    let user = document.getElementById("usuario").value;
    let pass = document.getElementById("senha").value;

    if(user === "spiderman" && pass === "123") {
        alert("Bem-vindo, herói 🕷️!");
    } else {
        document.getElementById("mensagem").innerText = "Acesso negado!";
    }
}

// FUNÇÃO QUE REDIRECIONA
function irMercadinho() {
    window.location.href = "mercadinho.html";
}
</script>

</body>
</html>
